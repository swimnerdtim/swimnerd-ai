services:
  - type: web
    name: swimnerd-ai-api
    env: python
    buildCommand: pip install -r requirements-ai.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT swimnerd_ai_api_render_v2:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
